name: Elite Bug Bounty Recon Pipeline

on:
  workflow_dispatch:
    inputs:
      target_domain:
        description: Root domain to recon
        required: true
        type: string
      checkpoint_run_id:
        description: Previous run id to resume from
        required: false
        type: string
  repository_dispatch:
    types:
      - elite-bug-bounty-recon-resume

permissions:
  contents: write
  actions: read

concurrency:
  group: elite-bug-bounty-recon-${{ github.event.client_payload.target_domain || github.event.inputs.target_domain }}
  cancel-in-progress: false

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      MAX_RUNTIME_SECONDS: "19800"
      BATCH_SIZE: "5000"
      WORK_ROOT: work
      NUCLEI_TEMPLATES: tools/nuclei-templates
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install system packages and Go tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq ripgrep
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/hueristiq/xsubfind3r/cmd/xsubfind3r@latest
          go install -v github.com/projectdiscovery/dnsx/cmd/dnsx@latest
          go install -v github.com/projectdiscovery/naabu/v2/cmd/naabu@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/lc/gau/v2/cmd/gau@latest
          go install -v github.com/tomnomnom/waybackurls@latest
          go install -v github.com/hueristiq/xcrawl3r/cmd/xcrawl3r@latest
          go install -v github.com/projectdiscovery/katana/cmd/katana@latest
          go install -v github.com/gitleaks/gitleaks/v8@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Build Subhunter
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/umutcamliyurt/Subhunter.git tools/Subhunter
          (cd tools/Subhunter && go build -o subhunter subhunter.go)

      - name: Clone nuclei templates
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git "$NUCLEI_TEMPLATES"

      - name: Restore or initialize checkpoint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_DOMAIN: ${{ github.event.client_payload.target_domain || github.event.inputs.target_domain }}
          SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id || github.event.inputs.checkpoint_run_id || '' }}
        run: |
          set -euo pipefail
          mkdir -p "$WORK_ROOT/resume" "$WORK_ROOT/artifacts"
          if [ -n "$SOURCE_RUN_ID" ]; then
            gh run download "$SOURCE_RUN_ID" --dir "$WORK_ROOT/resume" || true
            if find "$WORK_ROOT/resume" -name progress.json -print -quit | grep -q .; then
              python3 scripts/progress.py merge-latest --artifacts-dir "$WORK_ROOT/resume" --output "$WORK_ROOT/progress.json"
            fi
          fi
          if [ ! -f "$WORK_ROOT/progress.json" ]; then
            python3 scripts/progress.py init --target-domain "$TARGET_DOMAIN" --output "$WORK_ROOT/progress.json"
          fi
          echo "TARGET_DOMAIN=$TARGET_DOMAIN" >> "$GITHUB_ENV"

      - name: Subdomain enumeration
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=subdomain_enumeration
          next=dns_resolution
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          if [ "$SECONDS" -ge $((MAX_RUNTIME_SECONDS - 300)) ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            python3 - <<'PY'
import json, os, urllib.request
repo = os.environ["GITHUB_REPOSITORY"]
owner, name = repo.split("/", 1)
payload = {
    "event_type": "elite-bug-bounty-recon-resume",
    "client_payload": {
        "target_domain": os.environ["TARGET_DOMAIN"],
        "source_run_id": os.environ["GITHUB_RUN_ID"],
        "next_stage": "subdomain_enumeration",
        "current_batch": 1,
        "last_completed_stage": "",
    },
}
request = urllib.request.Request(
    f"https://api.github.com/repos/{owner}/{name}/dispatches",
    data=json.dumps(payload).encode("utf-8"),
    headers={
        "Accept": "application/vnd.github+json",
        "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
        "X-GitHub-Api-Version": "2022-11-28",
    },
    method="POST",
)
urllib.request.urlopen(request).read()
PY
            exit 0
          fi
          {
            subfinder -silent -d "$TARGET_DOMAIN" || true
            xsubfind3r -s -d "$TARGET_DOMAIN" || true
          } | sort -u > "$stage_dir/subs.txt"
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload subdomain artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-01-subdomain-enumeration
          path: work/artifacts/subdomain_enumeration
          if-no-files-found: ignore

      - name: DNS resolution
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=dns_resolution
          next=port_scanning
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          if [ "$SECONDS" -ge $((MAX_RUNTIME_SECONDS - 300)) ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            python3 - <<'PY'
import json, os, urllib.request
owner, name = os.environ["GITHUB_REPOSITORY"].split("/", 1)
payload = {
