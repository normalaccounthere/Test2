PY
            exit 0
          fi
          dnsx -silent -a -auto-wildcard -l "$WORK_ROOT/artifacts/subdomain_enumeration/subs.txt" -o "$stage_dir/resolved_raw.txt"
          awk '{print $1}' "$stage_dir/resolved_raw.txt" | sort -u > "$stage_dir/resolved.txt"
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload DNS artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-02-dns-resolution
          path: work/artifacts/dns_resolution
          if-no-files-found: ignore

      - name: Port scanning
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=port_scanning
          next=http_probing
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          if [ "$SECONDS" -ge $((MAX_RUNTIME_SECONDS - 300)) ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            python3 - <<'PY'
import json, os, urllib.request
