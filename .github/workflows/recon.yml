name: Elite Bug Bounty Recon Pipeline

on:
  workflow_dispatch:
    inputs:
      target_domain:
        description: 'Target domain to recon (e.g., example.com)'
        required: true
        type: string
  repository_dispatch:
    types: [resume_recon]

env:
  TARGET_DOMAIN: ''
  PROGRESS_FILE: progress.json
  RESULTS_DIR: results
  WORKFLOW_TIMEOUT_MINUTES: 330

defaults:
  run:
    shell: bash

jobs:
  recon:
    runs-on: ubuntu-latest
    outputs:
      target_domain: ${{ steps.resolve_target.outputs.target_domain }}
    steps:

# ============================================================
# SETUP
# ============================================================
      - name: Resolve target domain
        id: resolve_target
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TARGET="${{ github.event.client_payload.target_domain }}"
          else
            TARGET="${{ inputs.target_domain }}"
          fi
          echo "target_domain=$TARGET" >> $GITHUB_OUTPUT
          echo "TARGET_DOMAIN=$TARGET" >> $GITHUB_ENV

      - name: Restore checkpoint
        id: checkpoint
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "Auto-resume triggered - restoring checkpoint"
          fi
          if [[ -f "${{ env.PROGRESS_FILE }}" ]]; then
            echo "Found existing progress file"
            NEXT_STAGE=$(jq -r '.next_stage // "subdomain_enumeration"' "${{ env.PROGRESS_FILE }}")
            echo "Resuming from stage: $NEXT_STAGE"
          else
            echo "Initializing new recon for ${{ steps.resolve_target.outputs.target_domain }}"
            TARGET_DOMAIN="${{ steps.resolve_target.outputs.target_domain }}"
            jq -n \
              --arg domain "$TARGET_DOMAIN" \
              '{
                target_domain: $domain,
                last_completed_stage: "",
                next_stage: "subdomain_enumeration",
                current_batch: 0,
                timestamp: (now | todate),
                stages: {
                  subdomain_enumeration: {status: "pending", output: "subs.txt"},
                  dns_resolution: {status: "pending", output: "resolved.txt"},
                  port_scanning: {status: "pending", output: "ports.txt"},
                  http_probing: {status: "pending", output: "alive.txt"},
                  historical_urls: {status: "pending", output: "historical_urls.txt"},
                  live_crawling: {status: "pending", output: "crawled_urls.txt"},
                  url_normalization: {status: "pending", output: "normalized_urls.txt"},
                  js_analysis: {status: "pending", output: "js_files.txt"},
                  secret_discovery: {status: "pending", output: "secrets.txt"},
                  cloud_exposure: {status: "pending", output: "cloud_exposures.txt"},
                  subdomain_takeover: {status: "pending", output: "takeovers.txt"},
                   cors_testing: {status: "pending", output: "cors_findings.json"},
                  ssrf_discovery: {status: "pending", output: "ssrf_candidates.txt"},
                  open_redirect: {status: "pending", output: "redirect_findings.txt"},
                   sensitive_files: {status: "pending", output: "sensitive_files.json"},
                   default_creds: {status: "pending", output: "default_creds.json"},
                   nuclei_scanning: {status: "pending", output: "nuclei_results.json"}
                }
              }' > "${{ env.PROGRESS_FILE }}"
          fi

      - name: Download previous artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: ${{ env.RESULTS_DIR }}
          merge-multiple: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Go tools
        run: |
          TOOLS=(
            "github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest"
            "github.com/projectdiscovery/dnsx/cmd/dnsx@latest"
            "github.com/projectdiscovery/naabu/v2/cmd/naabu@latest"
            "github.com/projectdiscovery/httpx/cmd/httpx@latest"
            "github.com/projectdiscovery/katana/cmd/katana@latest"
            "github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest"
            "github.com/haccer/subjack@latest"
            "github.com/lc/gau/v2/cmd/gau@latest"
            "github.com/tomnomnom/assetfinder@latest"
            "github.com/tomnomnom/waybackurls@latest"
            "github.com/tomnomnom/unfurl@latest"
            "github.com/tomnomnom/qsreplace@latest"
            "github.com/lc/subjs@latest"
            "github.com/sa7mon/s3scanner@latest"
            "github.com/trufflesecurity/trufflehog/v3@latest"
          )
          for tool in "${TOOLS[@]}"; do
            echo "Installing $tool"
            go install -v "$tool" 2>/dev/null || echo "Failed: $tool"
          done
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Python tools
        run: |
          pip install requests jsbeautifier beautifulsoup4
           if [[ ! -d /opt/SecretFinder ]]; then git clone --depth 1 https://github.com/m4ll0k/SecretFinder.git /opt/SecretFinder || true; fi
           ls /opt/SecretFinder/SecretFinder.py 2>/dev/null && echo "SecretFinder installed" || echo "SecretFinder NOT installed"
           if [[ ! -d /opt/Corsy ]]; then git clone --depth 1 https://github.com/s0md3v/Corsy.git /opt/Corsy || true; fi
           ls /opt/Corsy/corsy.py 2>/dev/null && echo "Corsy installed" || echo "Corsy NOT installed"

      - name: Update Nuclei templates
        run: |
           nuclei -update-templates || true
           nuclei -version

# ============================================================
# STAGE 1: SUBDOMAIN ENUMERATION
# ============================================================
      - name: Stage 1 - Subdomain Enumeration
        id: subdomain_enumeration
        run: |
          if jq -e '.stages.subdomain_enumeration.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 1 already completed, skipping"; exit 0; fi
          jq '.stages.subdomain_enumeration.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          TARGET="${{ steps.resolve_target.outputs.target_domain }}"
           subfinder -d "$TARGET" -all -o "${{ env.RESULTS_DIR }}/subfinder.txt" 2>/dev/null || true
           assetfinder "$TARGET" > "${{ env.RESULTS_DIR }}/assetfinder.txt" 2>/dev/null || true
           amass enum -passive -d "$TARGET" -o "${{ env.RESULTS_DIR }}/amass.txt" 2>/dev/null || true
           cat "${{ env.RESULTS_DIR }}"/subfinder.txt "${{ env.RESULTS_DIR }}"/assetfinder.txt "${{ env.RESULTS_DIR }}"/amass.txt 2>/dev/null \
             | sort -u | grep -E "\.$TARGET$" | grep -v "^\*" > "${{ env.RESULTS_DIR }}/subs.txt" || true
          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/subs.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT subdomains"
          jq '.stages.subdomain_enumeration.status = "completed" | .last_completed_stage = "subdomain_enumeration" | .next_stage = "dns_resolution" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after subdomain enumeration
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-subdomains
          path: |
            ${{ env.RESULTS_DIR }}/subs.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 2: DNS RESOLUTION
# ============================================================
      - name: Stage 2 - DNS Resolution
        id: dns_resolution
        run: |
          if jq -e '.stages.dns_resolution.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 2 already completed, skipping"; exit 0; fi
          jq '.stages.dns_resolution.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ ! -f "${{ env.RESULTS_DIR }}/subs.txt" ]]; then echo "No subdomains to resolve"; jq '.stages.dns_resolution.status = "completed" | .last_completed_stage = "dns_resolution" | .next_stage = "port_scanning" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"; exit 0; fi
           dnsx -l "${{ env.RESULTS_DIR }}/subs.txt" -a -cname -mx -ptr -o "${{ env.RESULTS_DIR }}/resolved.txt" -r 8.8.8.8,1.1.1.1,8.8.4.4 2>/dev/null || true
          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/resolved.txt" 2>/dev/null || echo 0)
          echo "Resolved $COUNT subdomains"
          jq '.stages.dns_resolution.status = "completed" | .last_completed_stage = "dns_resolution" | .next_stage = "port_scanning" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after DNS resolution
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-dns
          path: |
            ${{ env.RESULTS_DIR }}/resolved.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 3: PORT SCANNING
# ============================================================
      - name: Stage 3 - Port Scanning
        id: port_scanning
        run: |
          if jq -e '.stages.port_scanning.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 3 already completed, skipping"; exit 0; fi
          jq '.stages.port_scanning.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ ! -f "${{ env.RESULTS_DIR }}/resolved.txt" ]]; then echo "No resolved hosts to scan"; jq '.stages.port_scanning.status = "completed" | .last_completed_stage = "port_scanning" | .next_stage = "http_probing" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"; exit 0; fi
          awk '{print $1}' "${{ env.RESULTS_DIR }}/resolved.txt" | sort -u > /tmp/hosts_to_scan.txt
           naabu -list /tmp/hosts_to_scan.txt -top-ports 100 -rate-limit 100 -c 25 -s c -o "${{ env.RESULTS_DIR }}/ports.txt" 2>/dev/null || true
           touch "${{ env.RESULTS_DIR }}/ports.txt"
           COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/ports.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT open ports"
          jq '.stages.port_scanning.status = "completed" | .last_completed_stage = "port_scanning" | .next_stage = "http_probing" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after port scanning
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-ports
          path: |
            ${{ env.RESULTS_DIR }}/ports.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 4: HTTP PROBING
# ============================================================
      - name: Stage 4 - HTTP Probing
        id: http_probing
        run: |
          if jq -e '.stages.http_probing.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 4 already completed, skipping"; exit 0; fi
          jq '.stages.http_probing.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ ! -f "${{ env.RESULTS_DIR }}/subs.txt" ]]; then echo "No targets for HTTP probing"; jq '.stages.http_probing.status = "completed" | .last_completed_stage = "http_probing" | .next_stage = "historical_urls" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"; exit 0; fi
          httpx -l "${{ env.RESULTS_DIR }}/subs.txt" -status-code -title -tech-detect -content-length -follow-redirects -cdn -ip -cname -rl 150 -o "${{ env.RESULTS_DIR }}/alive.txt" -json 2>/dev/null || true
          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/alive.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT live HTTP services"
          jq '.stages.http_probing.status = "completed" | .last_completed_stage = "http_probing" | .next_stage = "historical_urls" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after HTTP probing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-http
          path: |
            ${{ env.RESULTS_DIR }}/alive.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 5: HISTORICAL URL GATHERING
# ============================================================
      - name: Stage 5 - Historical URL Gathering
        id: historical_urls
        run: |
          if jq -e '.stages.historical_urls.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 5 already completed, skipping"; exit 0; fi
          jq '.stages.historical_urls.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          TARGET="${{ steps.resolve_target.outputs.target_domain }}"
          echo "$TARGET" | gau --subs --o "${{ env.RESULTS_DIR }}/gau_urls.txt" 2>/dev/null || true
          echo "$TARGET" | waybackurls > "${{ env.RESULTS_DIR }}/wayback_urls.txt" 2>/dev/null || true
          cat "${{ env.RESULTS_DIR }}"/gau_urls.txt "${{ env.RESULTS_DIR }}"/wayback_urls.txt 2>/dev/null | sort -u > "${{ env.RESULTS_DIR }}/historical_urls.txt"
          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/historical_urls.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT historical URLs"
          jq '.stages.historical_urls.status = "completed" | .last_completed_stage = "historical_urls" | .next_stage = "live_crawling" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after historical URLs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-historical
          path: |
            ${{ env.RESULTS_DIR }}/historical_urls.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 6: LIVE CRAWLING
# ============================================================
      - name: Stage 6 - Live Crawling
        id: live_crawling
        run: |
          if jq -e '.stages.live_crawling.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 6 already completed, skipping"; exit 0; fi
          jq '.stages.live_crawling.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          TARGET="${{ steps.resolve_target.outputs.target_domain }}"
          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            jq -r 'select(.url != null) | .url' "${{ env.RESULTS_DIR }}/alive.txt" > /tmp/live_urls.txt 2>/dev/null
            if [[ -s /tmp/live_urls.txt ]]; then
              katana -list /tmp/live_urls.txt -d 3 -jc -kf all -rl 50 -c 10 -silent -o "${{ env.RESULTS_DIR }}/crawled_urls.txt" 2>/dev/null || true
            fi
          fi
          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/crawled_urls.txt" 2>/dev/null || echo 0)
          echo "Crawled $COUNT URLs"
          jq '.stages.live_crawling.status = "completed" | .last_completed_stage = "live_crawling" | .next_stage = "url_normalization" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after crawling
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-crawled
          path: |
            ${{ env.RESULTS_DIR }}/crawled_urls.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 7: URL NORMALIZATION
# ============================================================
      - name: Stage 7 - URL Normalization
        id: url_normalization
        run: |
          if jq -e '.stages.url_normalization.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 7 already completed, skipping"; exit 0; fi
          jq '.stages.url_normalization.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
           cat "${{ env.RESULTS_DIR }}"/historical_urls.txt "${{ env.RESULTS_DIR }}"/crawled_urls.txt 2>/dev/null | sort -u > /tmp/all_raw_urls.txt || true
           if [[ ! -s /tmp/all_raw_urls.txt ]]; then echo "No URLs to normalize"; jq '.stages.url_normalization.status = "completed" | .last_completed_stage = "url_normalization" | .next_stage = "js_analysis" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"; exit 0; fi
           cat /tmp/all_raw_urls.txt | unfurl format "%s://%d%p" | sort -u > "${{ env.RESULTS_DIR }}/normalized_urls.txt" || true
          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/normalized_urls.txt" 2>/dev/null || echo 0)
          echo "Normalized to $COUNT unique URLs"
          jq '.stages.url_normalization.status = "completed" | .last_completed_stage = "url_normalization" | .next_stage = "js_analysis" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after normalization
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-normalized
          path: |
            ${{ env.RESULTS_DIR }}/normalized_urls.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 8: JAVASCRIPT ANALYSIS
# ============================================================
      - name: Stage 8 - JavaScript Analysis
        id: js_analysis
        run: |
          if jq -e '.stages.js_analysis.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 8 already completed, skipping"; exit 0; fi
          jq '.stages.js_analysis.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            cat "${{ env.RESULTS_DIR }}/normalized_urls.txt" | subjs 2>/dev/null | sort -u > "${{ env.RESULTS_DIR }}/js_files.txt" || true
            grep -iE '\.js($|\?)' "${{ env.RESULTS_DIR }}/normalized_urls.txt" 2>/dev/null >> "${{ env.RESULTS_DIR }}/js_files.txt" || true
            sort -u -o "${{ env.RESULTS_DIR }}/js_files.txt" "${{ env.RESULTS_DIR }}/js_files.txt"
            if [[ -s "${{ env.RESULTS_DIR }}/js_files.txt" ]]; then
              while IFS= read -r js_url; do
                python3 /opt/SecretFinder/SecretFinder.py -i "$js_url" -o cli 2>/dev/null >> /tmp/js_endpoints_raw.txt || true
              done < "${{ env.RESULTS_DIR }}/js_files.txt"
              sort -u /tmp/js_endpoints_raw.txt > "${{ env.RESULTS_DIR }}/js_endpoints.txt" 2>/dev/null || true
            fi
          fi
          JS_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/js_files.txt" 2>/dev/null || echo 0)
          EP_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/js_endpoints.txt" 2>/dev/null || echo 0)
          echo "Found $JS_COUNT JS files, $EP_COUNT endpoints"
          jq '.stages.js_analysis.status = "completed" | .last_completed_stage = "js_analysis" | .next_stage = "secret_discovery" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after JS analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-js
          path: |
            ${{ env.RESULTS_DIR }}/js_files.txt
            ${{ env.RESULTS_DIR }}/js_endpoints.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 9: SECRET DISCOVERY
# ============================================================
      - name: Stage 9 - Secret Discovery
        id: secret_discovery
        run: |
          if jq -e '.stages.secret_discovery.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 9 already completed, skipping"; exit 0; fi
          jq '.stages.secret_discovery.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -s "${{ env.RESULTS_DIR }}/js_files.txt" ]]; then
            while IFS= read -r js_url; do
              curl -sL "$js_url" 2>/dev/null >> /tmp/js_content.txt || true
            done < "${{ env.RESULTS_DIR }}/js_files.txt"
            if [[ -s /tmp/js_content.txt ]]; then
              trufflehog filesystem /tmp/js_content.txt --json 2>/dev/null > "${{ env.RESULTS_DIR }}/secrets.json" || true
            fi
          fi
          if [[ -s "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            trufflehog filesystem "${{ env.RESULTS_DIR }}/normalized_urls.txt" --json 2>/dev/null >> "${{ env.RESULTS_DIR }}/secrets.json" || true
          fi
          if [[ -f "${{ env.RESULTS_DIR }}/secrets.json" ]]; then
            jq -r '{source: (.SourceMetadata.Data.Filesystem.file // ""), detector: .DetectorName, raw: (.Raw[0:100] // "")} | "Source: \(.source) | Detector: \(.detector) | Raw: \(.raw)"' "${{ env.RESULTS_DIR }}/secrets.json" 2>/dev/null > "${{ env.RESULTS_DIR }}/secrets.txt" || true
          fi
          SECRET_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/secrets.txt" 2>/dev/null || echo 0)
          echo "Found $SECRET_COUNT potential secrets"
          jq '.stages.secret_discovery.status = "completed" | .last_completed_stage = "secret_discovery" | .next_stage = "cloud_exposure" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after secret discovery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-secrets
          path: |
            ${{ env.RESULTS_DIR }}/secrets.txt
            ${{ env.RESULTS_DIR }}/secrets.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 10: CLOUD EXPOSURE DETECTION
# ============================================================
      - name: Stage 10 - Cloud Storage Exposure Detection
        id: cloud_exposure
        run: |
          if jq -e '.stages.cloud_exposure.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 10 already completed, skipping"; exit 0; fi
          jq '.stages.cloud_exposure.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          TARGET="${{ steps.resolve_target.outputs.target_domain }}"
          ORG=$(echo "$TARGET" | cut -d. -f1)
           echo "$ORG" | s3scanner -o "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || true
           for prefix in "dev-" "prod-" "stage-" "test-" "backup-" "data-" "assets-" "media-" "uploads-"; do
             echo "${prefix}${ORG}" | s3scanner >> "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || true
           done
          sort -u -o "${{ env.RESULTS_DIR }}/cloud_exposures.txt" "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || true
          CLOUD_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || echo 0)
          echo "Found $CLOUD_COUNT potential cloud exposures"
          jq '.stages.cloud_exposure.status = "completed" | .last_completed_stage = "cloud_exposure" | .next_stage = "subdomain_takeover" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after cloud exposure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-cloud
          path: |
            ${{ env.RESULTS_DIR }}/cloud_exposures.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 11: SUBDOMAIN TAKEOVER DETECTION
# ============================================================
      - name: Stage 11 - Subdomain Takeover Detection
        id: subdomain_takeover
        run: |
          if jq -e '.stages.subdomain_takeover.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 11 already completed, skipping"; exit 0; fi
          jq '.stages.subdomain_takeover.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -f "${{ env.RESULTS_DIR }}/subs.txt" ]]; then
            subjack -w "${{ env.RESULTS_DIR }}/subs.txt" -t 50 -timeout 15 -ssl -o "${{ env.RESULTS_DIR }}/takeovers.txt" 2>/dev/null || true
            nuclei -l "${{ env.RESULTS_DIR }}/subs.txt" -tags takeover -rl 100 -c 25 -silent -json -o /tmp/nt.json 2>/dev/null || true
            if [[ -s /tmp/nt.json ]]; then cp /tmp/nt.json "${{ env.RESULTS_DIR }}/nuclei_takeovers.json"; fi
          fi
          TAKEOVER_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/takeovers.txt" 2>/dev/null || echo 0)
          echo "Found $TAKEOVER_COUNT potential takeovers"
          jq '.stages.subdomain_takeover.status = "completed" | .last_completed_stage = "subdomain_takeover" | .next_stage = "cors_testing" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after takeover detection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-takeovers
          path: |
            ${{ env.RESULTS_DIR }}/takeovers.txt
            ${{ env.RESULTS_DIR }}/nuclei_takeovers.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 12: CORS MISCONFIGURATION DETECTION
# ============================================================
      - name: Stage 12 - CORS Misconfiguration Detection
        id: cors_testing
        run: |
          if jq -e '.stages.cors_testing.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 12 already completed, skipping"; exit 0; fi
          jq '.stages.cors_testing.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            jq -r 'select(.url != null) | .url' "${{ env.RESULTS_DIR }}/alive.txt" > /tmp/cors_targets.txt 2>/dev/null
            if [[ -s /tmp/cors_targets.txt ]]; then
              python3 /opt/Corsy/corsy.py -i /tmp/cors_targets.txt -t 20 -o "${{ env.RESULTS_DIR }}/cors_findings.json" 2>/dev/null || true
              touch "${{ env.RESULTS_DIR }}/cors_findings.json"
            fi
          fi
          CORS_COUNT=$(jq 'length' "${{ env.RESULTS_DIR }}/cors_findings.json" 2>/dev/null || echo 0)
          echo "Found $CORS_COUNT CORS misconfigurations"
          jq '.stages.cors_testing.status = "completed" | .last_completed_stage = "cors_testing" | .next_stage = "ssrf_discovery" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after CORS testing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-cors
          path: |
            ${{ env.RESULTS_DIR }}/cors_findings.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 13: SSRF ENDPOINT DISCOVERY
# ============================================================
      - name: Stage 13 - SSRF Endpoint Discovery
        id: ssrf_discovery
        run: |
          if jq -e '.stages.ssrf_discovery.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 13 already completed, skipping"; exit 0; fi
          jq '.stages.ssrf_discovery.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            cat "${{ env.RESULTS_DIR }}/normalized_urls.txt" | unfurl keypairs | grep -iE '(url|uri|path|dest|redirect|return|next|file|load|read|document|site|html|image|img|src|link|out|view|path|page|feed|location|port|host|domain|callback|continue|target|endpoint|api|proxy)' | sort -u > "${{ env.RESULTS_DIR }}/ssrf_candidates.txt" 2>/dev/null || true
          fi
          SSR_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/ssrf_candidates.txt" 2>/dev/null || echo 0)
          echo "Found $SSR_COUNT SSRF candidate parameters"
          jq '.stages.ssrf_discovery.status = "completed" | .last_completed_stage = "ssrf_discovery" | .next_stage = "open_redirect" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after SSRF discovery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-ssrf
          path: |
            ${{ env.RESULTS_DIR }}/ssrf_candidates.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 14: OPEN REDIRECT DISCOVERY
# ============================================================
      - name: Stage 14 - Open Redirect Discovery
        id: open_redirect
        run: |
          if jq -e '.stages.open_redirect.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 14 already completed, skipping"; exit 0; fi
          jq '.stages.open_redirect.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            cat "${{ env.RESULTS_DIR }}/normalized_urls.txt" | unfurl keypairs | grep -iE '(redirect|return|next|url|link|to|out|target|callback|continue|dest|destination|ref|referer|referrer|url=|uri=|path=)' | sort -u > "${{ env.RESULTS_DIR }}/redirect_candidates.txt" 2>/dev/null || true
          fi
           if [[ -s "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            nuclei -l "${{ env.RESULTS_DIR }}/normalized_urls.txt" -tags redirect -rl 100 -c 20 -silent -json -o /tmp/rn.json 2>/dev/null || true
            if [[ -s /tmp/rn.json ]]; then cp /tmp/rn.json "${{ env.RESULTS_DIR }}/redirect_nuclei.json"; fi
           fi
          REDIR_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/redirect_candidates.txt" 2>/dev/null || echo 0)
          echo "Found $REDIR_COUNT open redirect candidates"
          jq '.stages.open_redirect.status = "completed" | .last_completed_stage = "open_redirect" | .next_stage = "sensitive_files" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after open redirect
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-redirect
          path: |
            ${{ env.RESULTS_DIR }}/redirect_candidates.txt
            ${{ env.RESULTS_DIR }}/redirect_nuclei.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 15: SENSITIVE FILE DETECTION
# ============================================================
      - name: Stage 15 - Sensitive File Detection
        id: sensitive_files
        run: |
          if jq -e '.stages.sensitive_files.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 15 already completed, skipping"; exit 0; fi
          jq '.stages.sensitive_files.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            jq -r 'select(.url != null) | .url' "${{ env.RESULTS_DIR }}/alive.txt" > /tmp/sensitive_targets.txt 2>/dev/null
            if [[ -s /tmp/sensitive_targets.txt ]]; then
              nuclei -l /tmp/sensitive_targets.txt -tags config,backup,env -severity high,critical -rl 100 -c 20 -json -o "${{ env.RESULTS_DIR }}/sensitive_files.json" 2>/dev/null || true
              touch "${{ env.RESULTS_DIR }}/sensitive_files.json"
            fi
           fi
           SNSTV_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/sensitive_files.json" 2>/dev/null || echo 0)
          echo "Found $SNSTV_COUNT potential sensitive file exposures"
          jq '.stages.sensitive_files.status = "completed" | .last_completed_stage = "sensitive_files" | .next_stage = "default_creds" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after sensitive files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-sensitive
          path: |
            ${{ env.RESULTS_DIR }}/sensitive_files.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 16: DEFAULT CREDENTIAL DETECTION
# ============================================================
      - name: Stage 16 - Default Credential Detection
        id: default_creds
        run: |
          if jq -e '.stages.default_creds.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 16 already completed, skipping"; exit 0; fi
          jq '.stages.default_creds.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            jq -r 'select(.url != null) | .url' "${{ env.RESULTS_DIR }}/alive.txt" > /tmp/cred_targets.txt 2>/dev/null
            if [[ -s /tmp/cred_targets.txt ]]; then
              nuclei -l /tmp/cred_targets.txt -tags default-login -severity high,critical -rl 100 -c 20 -json -o "${{ env.RESULTS_DIR }}/default_creds.json" 2>/dev/null || true
              nuclei -l /tmp/cred_targets.txt -tags exposed-panels -severity high,critical -rl 100 -c 20 -json -o "${{ env.RESULTS_DIR }}/admin_panels.json" 2>/dev/null || true
              touch "${{ env.RESULTS_DIR }}"/default_creds.json "${{ env.RESULTS_DIR }}"/admin_panels.json
            fi
          fi
          CRED_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/default_creds.json" 2>/dev/null || echo 0)
          echo "Found $CRED_COUNT potential default credentials"
          jq '.stages.default_creds.status = "completed" | .last_completed_stage = "default_creds" | .next_stage = "nuclei_scanning" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"

      - name: Upload artifacts after default creds
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-creds
          path: |
            ${{ env.RESULTS_DIR }}/default_creds.json
            ${{ env.RESULTS_DIR }}/admin_panels.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 17: HIGH-CONFIDENCE NUCLEI SCANNING
# ============================================================
      - name: Stage 17 - High-Confidence Nuclei Scanning
        id: nuclei_scanning
        run: |
          if jq -e '.stages.nuclei_scanning.status == "completed"' "${{ env.PROGRESS_FILE }}" > /dev/null 2>&1; then echo "Stage 17 already completed, skipping"; exit 0; fi
          jq '.stages.nuclei_scanning.status = "running" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
          if [[ ! -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]] || [[ ! -s "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            echo "No URLs for nuclei scanning"
            jq '.stages.nuclei_scanning.status = "completed" | .last_completed_stage = "nuclei_scanning" | .next_stage = "complete" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
            exit 0
          fi
          CURRENT_BATCH=$(jq -r '.current_batch // 0' "${{ env.PROGRESS_FILE }}")
          BATCH_SIZE=5000
          TOTAL_URLS=$(wc -l < "${{ env.RESULTS_DIR }}/normalized_urls.txt")
          TOTAL_BATCHES=$(( (TOTAL_URLS + BATCH_SIZE - 1) / BATCH_SIZE ))
          echo "Total URLs: $TOTAL_URLS, Total batches: $TOTAL_BATCHES, Starting from batch: $CURRENT_BATCH"
          HIGH_CONFIDENCE_TAGS="cve,exposure,config,default-login,panel,misconfig"
          for ((batch=CURRENT_BATCH; batch<TOTAL_BATCHES; batch++)); do
            START=$((batch * BATCH_SIZE))
            echo "Processing batch $((batch+1))/$TOTAL_BATCHES (URLs $START-$((START+BATCH_SIZE-1)))"
            sed -n "$((START+1)),$((START+BATCH_SIZE))p" "${{ env.RESULTS_DIR }}/normalized_urls.txt" > /tmp/nuclei_batch.txt
            if [[ ! -s /tmp/nuclei_batch.txt ]]; then continue; fi
            nuclei -l /tmp/nuclei_batch.txt -severity high,critical -tags $HIGH_CONFIDENCE_TAGS -rl 150 -bs 25 -c 25 -timeout 10 -retries 1 -json -o /tmp/nuclei_batch_output.json 2>/dev/null || true
            cat /tmp/nuclei_batch_output.json >> "${{ env.RESULTS_DIR }}/nuclei_results.json" 2>/dev/null || true
            jq --arg b "$((batch + 1))" '.current_batch = ($b | tonumber) | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
            if [[ $((batch % 5)) -eq 0 ]] || [[ $batch -eq $((TOTAL_BATCHES - 1)) ]]; then
              cp "${{ env.RESULTS_DIR }}/nuclei_results.json" /tmp/nuclei_checkpoint.json 2>/dev/null || true
              echo "Checkpoint at batch $((batch+1))"
            fi
              ELAPSED_MINUTES=$((SECONDS / 60))
             if [[ $ELAPSED_MINUTES -gt ${{ env.WORKFLOW_TIMEOUT_MINUTES }} ]]; then
               echo "Approaching timeout. Triggering auto-resume (keeping stage as in_progress)."
               jq '.stages.nuclei_scanning.status = "in_progress" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
               curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/dispatches -d "{\"event_type\":\"resume_recon\",\"client_payload\":{\"target_domain\":\"${{ steps.resolve_target.outputs.target_domain }}\"}}" || true
               echo "Auto-resume triggered."
               break
             fi
           done
           CURRENT_STATUS=$(jq -r '.stages.nuclei_scanning.status' "${{ env.PROGRESS_FILE }}")
           if [[ "$CURRENT_STATUS" != "in_progress" ]]; then
             jq '.stages.nuclei_scanning.status = "completed" | .last_completed_stage = "nuclei_scanning" | .next_stage = "complete" | .timestamp = (now | todate)' "${{ env.PROGRESS_FILE }}" > /tmp/p.json && mv /tmp/p.json "${{ env.PROGRESS_FILE }}"
           else
             echo "Stage not completed - auto-resume will continue on next run"
           fi

      - name: Upload artifacts after nuclei scanning
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-nuclei
          path: |
            ${{ env.RESULTS_DIR }}/nuclei_results.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# FINAL CONSOLIDATION & REPORTING
# ============================================================
      - name: Consolidate final results
        if: always()
        run: |
          echo "=== ELITE BUG BOUNTY RECON PIPELINE - FINAL REPORT ===" > ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "Target: ${{ steps.resolve_target.outputs.target_domain }}" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "Timestamp: $(date -u)" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "=== Stage Results ===" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          jq -r '.stages | to_entries[] | "\(.key): \(.value.status) (\(.value.output // "N/A"))"' "${{ env.PROGRESS_FILE }}" 2>/dev/null >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt || true
          echo "" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "=== File Counts ===" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          for f in "${{ env.RESULTS_DIR }}"/*.txt "${{ env.RESULTS_DIR }}"/*.json; do
            if [[ -f "$f" ]]; then
              echo "$(basename "$f"): $(wc -l < "$f" 2>/dev/null || echo 0) lines" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
            fi
          done

      - name: Upload final consolidated results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-final
          path: ${{ env.RESULTS_DIR }}/
          if-no-files-found: warn
