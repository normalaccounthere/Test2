name: Elite Bug Bounty Recon Pipeline

on:
  workflow_dispatch:
    inputs:
      target_domain:
        description: 'Target domain to recon (e.g., example.com)'
        required: true
        type: string
      debug:
        description: 'Enable debug mode (skip to specific stage)'
        required: false
        default: ''
        type: string
  repository_dispatch:
    types: [resume_recon]

env:
  TARGET_DOMAIN: ''
  PROGRESS_FILE: progress.json
  RESULTS_DIR: results
  WORKFLOW_TIMEOUT_MINUTES: 330
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

defaults:
  run:
    shell: bash

jobs:
  recon:
    runs-on: ubuntu-latest
    outputs:
      progress_state: ${{ steps.checkpoint.outputs.progress_state }}
      target_domain: ${{ steps.resolve_target.outputs.target_domain }}
    steps:

# ============================================================
# SETUP & CHECKPOINT RESTORE
# ============================================================
      - name: Resolve target domain
        id: resolve_target
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TARGET="${{ github.event.client_payload.target_domain }}"
          else
            TARGET="${{ inputs.target_domain }}"
          fi
          echo "target_domain=$TARGET" >> $GITHUB_OUTPUT
          echo "TARGET_DOMAIN=$TARGET" >> $GITHUB_ENV

      - name: Restore checkpoint
        id: checkpoint
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          
          # Download artifacts from previous runs if they exist
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "Auto-resume triggered - restoring checkpoint"
            # Artifacts are automatically downloaded via actions/download-artifact
          fi
          
          # Initialize or read progress
          if [[ -f "${{ env.PROGRESS_FILE }}" ]]; then
            echo "Found existing progress file"
            NEXT_STAGE=$(python3 scripts/manage_progress.py read 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('next_stage','subdomain_enumeration'))" 2>/dev/null || echo "subdomain_enumeration")
            echo "progress_state=resume" >> $GITHUB_OUTPUT
            echo "Resuming from stage: $NEXT_STAGE"
          else
            echo "Initializing new recon for ${{ steps.resolve_target.outputs.target_domain }}"
            python3 scripts/manage_progress.py init "${{ steps.resolve_target.outputs.target_domain }}"
            echo "progress_state=new" >> $GITHUB_OUTPUT
          fi

      - name: Download previous artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: ${{ env.RESULTS_DIR }}
          merge-multiple: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Go tools
        run: |
          TOOLS=(
            "github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest"
            "github.com/projectdiscovery/dnsx/cmd/dnsx@latest"
            "github.com/projectdiscovery/naabu/v2/cmd/naabu@latest"
            "github.com/projectdiscovery/httpx/cmd/httpx@latest"
            "github.com/projectdiscovery/katana/cmd/katana@latest"
            "github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest"
            "github.com/haccer/subjack@latest"
            "github.com/lc/gau/v2/cmd/gau@latest"
            "github.com/tomnomnom/assetfinder@latest"
            "github.com/tomnomnom/waybackurls@latest"
            "github.com/tomnomnom/unfurl@latest"
            "github.com/tomnomnom/qsreplace@latest"
            "github.com/lc/subjs@latest"
            "github.com/sa7mon/s3scanner@latest"
            "github.com/trufflesecurity/trufflehog/v3@latest"
          )
          for tool in "${TOOLS[@]}"; do
            echo "Installing $tool"
            go install -v "$tool" 2>/dev/null || echo "Failed: $tool"
          done
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Python tools
        run: |
          pip install requests jsbeautifier
          git clone --depth 1 https://github.com/m4ll0k/SecretFinder.git /opt/SecretFinder 2>/dev/null || true
          git clone --depth 1 https://github.com/s0md3v/Corsy.git /opt/Corsy 2>/dev/null || true
          echo "Tools installed"

      - name: Update Nuclei templates
        run: |
          nuclei -update-templates 2>/dev/null || true

# ============================================================
# STAGE 1: SUBDOMAIN ENUMERATION
# ============================================================
      - name: Stage 1 - Subdomain Enumeration
        id: subdomain_enumeration
        if: steps.checkpoint.outputs.progress_state != 'resume' || (steps.checkpoint.outputs.progress_state == 'resume' && !contains(fromJson(steps.checkpoint.outputs.progress_state), 'subdomain_enumeration'))
        run: |
          python3 scripts/manage_progress.py status subdomain_enumeration running

          TARGET="${{ steps.resolve_target.outputs.target_domain }}"
          
          # Passive enumeration
          subfinder -d "$TARGET" -all -o "${{ env.RESULTS_DIR }}/subfinder.txt" 2>/dev/null
          assetfinder "$TARGET" > "${{ env.RESULTS_DIR }}/assetfinder.txt" 2>/dev/null
          
          # Active enumeration with Amass (limited scope)
          amass enum -passive -d "$TARGET" -o "${{ env.RESULTS_DIR }}/amass.txt" 2>/dev/null || true
          
          # Merge and deduplicate
          cat "${{ env.RESULTS_DIR }}"/subfinder.txt "${{ env.RESULTS_DIR }}"/assetfinder.txt "${{ env.RESULTS_DIR }}"/amass.txt 2>/dev/null \
            | sort -u | grep -E "\.$TARGET$" | grep -v "^\*" > "${{ env.RESULTS_DIR }}/subs.txt"
          
          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/subs.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT subdomains"
          
          python3 scripts/manage_progress.py complete subdomain_enumeration

      - name: Upload artifacts after subdomain enumeration
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-subdomains
          path: |
            ${{ env.RESULTS_DIR }}/subs.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 2: DNS RESOLUTION
# ============================================================
      - name: Stage 2 - DNS Resolution
        id: dns_resolution
        run: |
          python3 scripts/manage_progress.py status dns_resolution running

          if [[ ! -f "${{ env.RESULTS_DIR }}/subs.txt" ]]; then
            echo "No subdomains to resolve"
            python3 scripts/manage_progress.py complete dns_resolution
            exit 0
          fi

          # Resolve with wildcard detection
          dnsx -l "${{ env.RESULTS_DIR }}/subs.txt" \
            -a -cname -mx -ptr \
            -wildcard \
            -o "${{ env.RESULTS_DIR }}/resolved.txt" \
            -r 8.8.8.8,1.1.1.1,8.8.4.4 2>/dev/null

          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/resolved.txt" 2>/dev/null || echo 0)
          echo "Resolved $COUNT subdomains"

          python3 scripts/manage_progress.py complete dns_resolution

      - name: Upload artifacts after DNS resolution
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-dns
          path: |
            ${{ env.RESULTS_DIR }}/resolved.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 3: PORT SCANNING
# ============================================================
      - name: Stage 3 - Port Scanning
        id: port_scanning
        run: |
          python3 scripts/manage_progress.py status port_scanning running

          if [[ ! -f "${{ env.RESULTS_DIR }}/resolved.txt" ]]; then
            echo "No resolved hosts to scan"
            python3 scripts/manage_progress.py complete port_scanning
            exit 0
          fi

          # Extract just domains/hosts from resolved output
          awk '{print $1}' "${{ env.RESULTS_DIR }}/resolved.txt" | sort -u > /tmp/hosts_to_scan.txt

          # Rate-limited port scan using CONNECT scan (no root needed)
          naabu -list /tmp/hosts_to_scan.txt \
            -top-ports 100 \
            -rate-limit 100 \
            -c 25 \
            -s c \
            -o "${{ env.RESULTS_DIR }}/ports.txt" 2>/dev/null || true

          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/ports.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT open ports"

          python3 scripts/manage_progress.py complete port_scanning

      - name: Upload artifacts after port scanning
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-ports
          path: |
            ${{ env.RESULTS_DIR }}/ports.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 4: HTTP PROBING
# ============================================================
      - name: Stage 4 - HTTP Probing
        id: http_probing
        run: |
          python3 scripts/manage_progress.py status http_probing running

          if [[ ! -f "${{ env.RESULTS_DIR }}/ports.txt" ]] && [[ ! -f "${{ env.RESULTS_DIR }}/subs.txt" ]]; then
            echo "No targets for HTTP probing"
            python3 scripts/manage_progress.py complete http_probing
            exit 0
          fi

          # Use both subdomains and port scan results
          if [[ -f "${{ env.RESULTS_DIR }}/subs.txt" ]]; then
            TARGETS="${{ env.RESULTS_DIR }}/subs.txt"
          else
            echo "No targets available"
            python3 scripts/manage_progress.py complete http_probing
            exit 0
          fi

          httpx -l "$TARGETS" \
            -status-code -title -tech-detect -content-length \
            -follow-redirects -cdn -ip -cname \
            -rl 150 \
            -o "${{ env.RESULTS_DIR }}/alive.txt" \
            -json 2>/dev/null || true

          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/alive.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT live HTTP services"

          python3 scripts/manage_progress.py complete http_probing

      - name: Upload artifacts after HTTP probing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-http
          path: |
            ${{ env.RESULTS_DIR }}/alive.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 5: HISTORICAL URL GATHERING
# ============================================================
      - name: Stage 5 - Historical URL Gathering
        id: historical_urls
        run: |
          python3 scripts/manage_progress.py status historical_urls running

          TARGET="${{ steps.resolve_target.outputs.target_domain }}"

          # gau with multiple providers
          echo "$TARGET" | gau --subs \
            --o "${{ env.RESULTS_DIR }}/gau_urls.txt" 2>/dev/null || true

          # waybackurls for additional coverage
          echo "$TARGET" | waybackurls > "${{ env.RESULTS_DIR }}/wayback_urls.txt" 2>/dev/null || true

          # Merge and deduplicate
          cat "${{ env.RESULTS_DIR }}"/gau_urls.txt "${{ env.RESULTS_DIR }}"/wayback_urls.txt 2>/dev/null \
            | sort -u > "${{ env.RESULTS_DIR }}/historical_urls.txt"

          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/historical_urls.txt" 2>/dev/null || echo 0)
          echo "Found $COUNT historical URLs"

          python3 scripts/manage_progress.py complete historical_urls

      - name: Upload artifacts after historical URLs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-historical
          path: |
            ${{ env.RESULTS_DIR }}/historical_urls.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 6: LIVE CRAWLING
# ============================================================
      - name: Stage 6 - Live Crawling
        id: live_crawling
        run: |
          python3 scripts/manage_progress.py status live_crawling running

          TARGET="${{ steps.resolve_target.outputs.target_domain }}"

          # Use katana on live targets
          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            # Extract URLs from httpx output (JSON)
            cat "${{ env.RESULTS_DIR }}/alive.txt" 2>/dev/null | python3 -c "
import sys, json
for line in sys.stdin:
    try:
        d = json.loads(line.strip())
        url = d.get('url', '')
        if url:
            print(url)
    except:
        pass
" 2>/dev/null > /tmp/live_urls.txt

            if [[ -s /tmp/live_urls.txt ]]; then
              katana -list /tmp/live_urls.txt \
                -d 3 \
                -jc \
                -kf robotstxt,sitemapxml \
                -rl 50 \
                -c 10 \
                -silent \
                -o "${{ env.RESULTS_DIR }}/crawled_urls.txt" 2>/dev/null || true
            fi
          fi

          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/crawled_urls.txt" 2>/dev/null || echo 0)
          echo "Crawled $COUNT URLs"

          python3 scripts/manage_progress.py complete live_crawling

      - name: Upload artifacts after crawling
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-crawled
          path: |
            ${{ env.RESULTS_DIR }}/crawled_urls.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 7: URL NORMALIZATION
# ============================================================
      - name: Stage 7 - URL Normalization
        id: url_normalization
        run: |
          python3 scripts/manage_progress.py status url_normalization running

          # Merge all URL sources
          cat "${{ env.RESULTS_DIR }}"/historical_urls.txt "${{ env.RESULTS_DIR }}"/crawled_urls.txt 2>/dev/null \
            | sort -u > /tmp/all_raw_urls.txt

          if [[ ! -s /tmp/all_raw_urls.txt ]]; then
            echo "No URLs to normalize"
            python3 scripts/manage_progress.py complete url_normalization
            exit 0
          fi

          # Normalize: deduplicate by path structure, keep unique URLs
          cat /tmp/all_raw_urls.txt \
            | unfurl format "%s://%d%p" \
            | sort -u \
            > "${{ env.RESULTS_DIR }}/normalized_urls.txt"

          COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/normalized_urls.txt" 2>/dev/null || echo 0)
          echo "Normalized to $COUNT unique URLs"

          python3 scripts/manage_progress.py complete url_normalization

      - name: Upload artifacts after normalization
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-normalized
          path: |
            ${{ env.RESULTS_DIR }}/normalized_urls.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 8: JAVASCRIPT ANALYSIS
# ============================================================
      - name: Stage 8 - JavaScript Analysis
        id: js_analysis
        run: |
          python3 scripts/manage_progress.py status js_analysis running

          if [[ -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            # Extract JS files using subjs
            cat "${{ env.RESULTS_DIR }}/normalized_urls.txt" \
              | subjs 2>/dev/null \
              | sort -u > "${{ env.RESULTS_DIR }}/js_files.txt" || true

            # Also find inline JS endpoints from historical/crawled URLs
            grep -iE '\.js($|\?)' "${{ env.RESULTS_DIR }}/normalized_urls.txt" 2>/dev/null \
              >> "${{ env.RESULTS_DIR }}/js_files.txt" || true
            sort -u -o "${{ env.RESULTS_DIR }}/js_files.txt" "${{ env.RESULTS_DIR }}/js_files.txt"

            # Extract endpoints from JS files using SecretFinder
            if [[ -s "${{ env.RESULTS_DIR }}/js_files.txt" ]]; then
              mkdir -p /tmp/js_endpoints
              while IFS= read -r js_url; do
                python3 /opt/SecretFinder/SecretFinder.py \
                  -i "$js_url" \
                  -o cli 2>/dev/null >> /tmp/js_endpoints_raw.txt || true
              done < "${{ env.RESULTS_DIR }}/js_files.txt"
              sort -u /tmp/js_endpoints_raw.txt > "${{ env.RESULTS_DIR }}/js_endpoints.txt" 2>/dev/null || true
            fi
          fi

          JS_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/js_files.txt" 2>/dev/null || echo 0)
          EP_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/js_endpoints.txt" 2>/dev/null || echo 0)
          echo "Found $JS_COUNT JS files, $EP_COUNT endpoints"

          python3 scripts/manage_progress.py complete js_analysis

      - name: Upload artifacts after JS analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-js
          path: |
            ${{ env.RESULTS_DIR }}/js_files.txt
            ${{ env.RESULTS_DIR }}/js_endpoints.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 9: SECRET DISCOVERY
# ============================================================
      - name: Stage 9 - Secret Discovery
        id: secret_discovery
        run: |
          python3 scripts/manage_progress.py status secret_discovery running

          # Scan JS files with trufflehog
          if [[ -s "${{ env.RESULTS_DIR }}/js_files.txt" ]]; then
            while IFS= read -r js_url; do
              curl -sL "$js_url" 2>/dev/null >> /tmp/js_content.txt || true
            done < "${{ env.RESULTS_DIR }}/js_files.txt"

            if [[ -s /tmp/js_content.txt ]]; then
              trufflehog filesystem /tmp/js_content.txt \
                --json 2>/dev/null > "${{ env.RESULTS_DIR }}/secrets.json" || true
            fi
          fi

          # Also scan normalized URLs for secret patterns
          if [[ -s "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            trufflehog filesystem "${{ env.RESULTS_DIR }}/normalized_urls.txt" \
              --json 2>/dev/null >> "${{ env.RESULTS_DIR }}/secrets.json" || true
          fi

          # Convert to readable format
          if [[ -f "${{ env.RESULTS_DIR }}/secrets.json" ]]; then
            python3 -c "
import json, sys
try:
    with open('${{ env.RESULTS_DIR }}/secrets.json') as f:
        for line in f:
            try:
                d = json.loads(line.strip())
                print(json.dumps({'source': d.get('SourceMetadata', {}).get('Data', {}).get('Filesystem', {}).get('file', ''),
                                'detector': d.get('DetectorName', ''),
                                'raw': d.get('Raw', '')[:100]}))
            except:
                pass
except:
    pass
" 2>/dev/null > "${{ env.RESULTS_DIR }}/secrets.txt" || true
          fi

          SECRET_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/secrets.txt" 2>/dev/null || echo 0)
          echo "Found $SECRET_COUNT potential secrets"

          python3 scripts/manage_progress.py complete secret_discovery

      - name: Upload artifacts after secret discovery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-secrets
          path: |
            ${{ env.RESULTS_DIR }}/secrets.txt
            ${{ env.RESULTS_DIR }}/secrets.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 10: CLOUD EXPOSURE DETECTION
# ============================================================
      - name: Stage 10 - Cloud Storage Exposure Detection
        id: cloud_exposure
        run: |
          python3 scripts/manage_progress.py status cloud_exposure running

          TARGET="${{ steps.resolve_target.outputs.target_domain }}"
          ORG=$(echo "$TARGET" | cut -d. -f1)

          # Scan for open S3 buckets using permutations
          echo "$ORG" | s3scanner -o "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || true

          # Also bucket permutations with common prefixes
          for prefix in "" "dev-" "prod-" "stage-" "test-" "backup-" "data-" "assets-" "media-" "uploads-"; do
            echo "${prefix}${ORG}" | s3scanner -o "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || true
          done

          sort -u -o "${{ env.RESULTS_DIR }}/cloud_exposures.txt" "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || true

          CLOUD_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/cloud_exposures.txt" 2>/dev/null || echo 0)
          echo "Found $CLOUD_COUNT potential cloud exposures"

          python3 scripts/manage_progress.py complete cloud_exposure

      - name: Upload artifacts after cloud exposure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-cloud
          path: |
            ${{ env.RESULTS_DIR }}/cloud_exposures.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 11: SUBDOMAIN TAKEOVER DETECTION
# ============================================================
      - name: Stage 11 - Subdomain Takeover Detection
        id: subdomain_takeover
        run: |
          python3 scripts/manage_progress.py status subdomain_takeover running

          if [[ -f "${{ env.RESULTS_DIR }}/subs.txt" ]]; then
            subjack -w "${{ env.RESULTS_DIR }}/subs.txt" \
              -t 50 \
              -timeout 15 \
              -ssl \
              -o "${{ env.RESULTS_DIR }}/takeovers.txt" 2>/dev/null || true

            # Also run nuclei takeover templates for additional coverage
            cat "${{ env.RESULTS_DIR }}/subs.txt" \
              | nuclei -t ~/nuclei-templates/takeovers/ \
                -rl 100 \
                -c 25 \
                -silent \
                -json 2>/dev/null >> "${{ env.RESULTS_DIR }}/nuclei_takeovers.json" || true
          fi

          TAKEOVER_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/takeovers.txt" 2>/dev/null || echo 0)
          echo "Found $TAKEOVER_COUNT potential takeovers"

          python3 scripts/manage_progress.py complete subdomain_takeover

      - name: Upload artifacts after takeover detection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-takeovers
          path: |
            ${{ env.RESULTS_DIR }}/takeovers.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 12: CORS MISCONFIGURATION DETECTION
# ============================================================
      - name: Stage 12 - CORS Misconfiguration Detection
        id: cors_testing
        run: |
          python3 scripts/manage_progress.py status cors_testing running

          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            # Extract URLs from httpx JSON output
            cat "${{ env.RESULTS_DIR }}/alive.txt" 2>/dev/null | python3 -c "
import sys, json
for line in sys.stdin:
    try:
        d = json.loads(line.strip())
        url = d.get('url', '')
        if url:
            print(url)
    except:
        pass
" 2>/dev/null > /tmp/cors_targets.txt

            if [[ -s /tmp/cors_targets.txt ]]; then
              python3 /opt/Corsy/corsy.py \
                -i /tmp/cors_targets.txt \
                -t 20 \
                -o "${{ env.RESULTS_DIR }}/cors_findings.json" 2>/dev/null || true
            fi
          fi

          CORS_COUNT=$(python3 -c "import json; data=json.load(open('${{ env.RESULTS_DIR }}/cors_findings.json')); print(len(data))" 2>/dev/null || echo 0)
          echo "Found $CORS_COUNT CORS misconfigurations"

          python3 scripts/manage_progress.py complete cors_testing

      - name: Upload artifacts after CORS testing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-cors
          path: |
            ${{ env.RESULTS_DIR }}/cors_findings.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 13: SSRF ENDPOINT DISCOVERY
# ============================================================
      - name: Stage 13 - SSRF Endpoint Discovery
        id: ssrf_discovery
        run: |
          python3 scripts/manage_progress.py status ssrf_discovery running

          # Identify endpoints with parameters that commonly accept URLs
          if [[ -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            # Find URL parameters that could be SSRF-prone
            cat "${{ env.RESULTS_DIR }}/normalized_urls.txt" \
              | unfurl keypairs \
              | grep -iE '(url|uri|path|dest|redirect|return|next|file|load|read|document|site|html|image|img|src|link|out|view|path|page|feed|location|port|host|domain|callback|continue|target|endpoint|api|proxy)' \
              | sort -u \
              > "${{ env.RESULTS_DIR }}/ssrf_candidates.txt" 2>/dev/null || true
          fi

          SSR_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/ssrf_candidates.txt" 2>/dev/null || echo 0)
          echo "Found $SSR_COUNT SSRF candidate parameters"

          python3 scripts/manage_progress.py complete ssrf_discovery

      - name: Upload artifacts after SSRF discovery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-ssrf
          path: |
            ${{ env.RESULTS_DIR }}/ssrf_candidates.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 14: OPEN REDIRECT DISCOVERY
# ============================================================
      - name: Stage 14 - Open Redirect Discovery
        id: open_redirect
        run: |
          python3 scripts/manage_progress.py status open_redirect running

          # Identify potentially open redirect parameters
          if [[ -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            cat "${{ env.RESULTS_DIR }}/normalized_urls.txt" \
              | unfurl keypairs \
              | grep -iE '(redirect|return|next|url|link|to|out|target|callback|continue|dest|destination|ref|referer|referrer|url=|uri=|path=)' \
              | sort -u \
              > "${{ env.RESULTS_DIR }}/redirect_candidates.txt" 2>/dev/null || true
          fi

          # Use nuclei open-redirect templates for validation
          if [[ -s "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            cat "${{ env.RESULTS_DIR }}/normalized_urls.txt" \
              | nuclei -t ~/nuclei-templates/http/exposures/ \
                -tags redirect \
                -rl 100 \
                -c 20 \
                -silent \
                -json 2>/dev/null > "${{ env.RESULTS_DIR }}/redirect_nuclei.json" || true
          fi

          REDIR_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/redirect_candidates.txt" 2>/dev/null || echo 0)
          echo "Found $REDIR_COUNT open redirect candidates"

          python3 scripts/manage_progress.py complete open_redirect

      - name: Upload artifacts after open redirect
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-redirect
          path: |
            ${{ env.RESULTS_DIR }}/redirect_candidates.txt
            ${{ env.RESULTS_DIR }}/redirect_findings.txt
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 15: SENSITIVE FILE DETECTION
# ============================================================
      - name: Stage 15 - Sensitive File Detection
        id: sensitive_files
        run: |
          python3 scripts/manage_progress.py status sensitive_files running

          # Nuclei templates for sensitive file exposure
          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            cat "${{ env.RESULTS_DIR }}/alive.txt" | python3 -c "
import sys, json
for line in sys.stdin:
    try:
        d = json.loads(line.strip())
        url = d.get('url', '')
        if url:
            print(url)
    except:
        pass
" 2>/dev/null > /tmp/sensitive_targets.txt

            if [[ -s /tmp/sensitive_targets.txt ]]; then
              nuclei -l /tmp/sensitive_targets.txt \
                -t ~/nuclei-templates/http/exposures/ \
                -tags config,backup,env \
                -severity high,critical \
                -rl 100 \
                -c 20 \
                -json \
                -o "${{ env.RESULTS_DIR }}/sensitive_files.json" 2>/dev/null || true
            fi
          fi

          SNSTV_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/sensitive_files.json" 2>/dev/null || echo 0)
          echo "Found $SNSTV_COUNT potential sensitive file exposures"

          python3 scripts/manage_progress.py complete sensitive_files

      - name: Upload artifacts after sensitive files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-sensitive
          path: |
            ${{ env.RESULTS_DIR }}/sensitive_files.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 16: DEFAULT CREDENTIAL DETECTION
# ============================================================
      - name: Stage 16 - Default Credential Detection
        id: default_creds
        run: |
          python3 scripts/manage_progress.py status default_creds running

          if [[ -f "${{ env.RESULTS_DIR }}/alive.txt" ]]; then
            cat "${{ env.RESULTS_DIR }}/alive.txt" | python3 -c "
import sys, json
for line in sys.stdin:
    try:
        d = json.loads(line.strip())
        url = d.get('url', '')
        if url:
            print(url)
    except:
        pass
" 2>/dev/null > /tmp/cred_targets.txt

            if [[ -s /tmp/cred_targets.txt ]]; then
              # Nuclei templates for default credentials and exposed panels
              nuclei -l /tmp/cred_targets.txt \
                -t ~/nuclei-templates/http/default-logins/ \
                -severity high,critical \
                -rl 100 \
                -c 20 \
                -json \
                -o "${{ env.RESULTS_DIR }}/default_creds.json" 2>/dev/null || true

              # Also check for exposed admin panels
              nuclei -l /tmp/cred_targets.txt \
                -t ~/nuclei-templates/http/exposed-panels/ \
                -severity high,critical \
                -rl 100 \
                -c 20 \
                -json \
                -o "${{ env.RESULTS_DIR }}/admin_panels.json" 2>/dev/null || true
            fi
          fi

          CRED_COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/default_creds.json" 2>/dev/null || echo 0)
          echo "Found $CRED_COUNT potential default credentials"

          python3 scripts/manage_progress.py complete default_creds

      - name: Upload artifacts after default creds
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-creds
          path: |
            ${{ env.RESULTS_DIR }}/default_creds.json
            ${{ env.RESULTS_DIR }}/admin_panels.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# STAGE 17: HIGH-CONFIDENCE NUCLEI SCANNING
# ============================================================
      - name: Stage 17 - High-Confidence Nuclei Scanning
        id: nuclei_scanning
        run: |
          python3 scripts/manage_progress.py status nuclei_scanning running

          # Prepare targets from normalized URLs
          if [[ ! -f "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]] || [[ ! -s "${{ env.RESULTS_DIR }}/normalized_urls.txt" ]]; then
            echo "No URLs for nuclei scanning"
            python3 scripts/manage_progress.py complete nuclei_scanning
            exit 0
          fi

          # Read progress to get current batch
          PROGRESS=$(python3 scripts/manage_progress.py read 2>/dev/null)
          CURRENT_BATCH=$(echo "$PROGRESS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('current_batch', 0))" 2>/dev/null || echo 0)
          BATCH_SIZE=5000
          TOTAL_URLS=$(wc -l < "${{ env.RESULTS_DIR }}/normalized_urls.txt")
          TOTAL_BATCHES=$(( (TOTAL_URLS + BATCH_SIZE - 1) / BATCH_SIZE ))

          echo "Total URLs: $TOTAL_URLS, Total batches: $TOTAL_BATCHES, Starting from batch: $CURRENT_BATCH"

          # Scan with targeted high-confidence templates only
          HIGH_CONFIDENCE_TAGS="cve,exposure,config,default-login,panel,misconfig"
          
          for ((batch=CURRENT_BATCH; batch<TOTAL_BATCHES; batch++)); do
            START=$((batch * BATCH_SIZE))
            echo "Processing batch $((batch+1))/$TOTAL_BATCHES (URLs $START-$((START+BATCH_SIZE-1)))"

            sed -n "$((START+1)),$((START+BATCH_SIZE))p" "${{ env.RESULTS_DIR }}/normalized_urls.txt" \
              > /tmp/nuclei_batch.txt

            if [[ ! -s /tmp/nuclei_batch.txt ]]; then
              continue
            fi

            nuclei -l /tmp/nuclei_batch.txt \
              -severity high,critical \
              -tags $HIGH_CONFIDENCE_TAGS \
              -rl 150 \
              -bs 25 \
              -c 25 \
              -timeout 10 \
              -retries 1 \
              -json \
              -o /tmp/nuclei_batch_output.json 2>/dev/null || true

            # Append to results
            cat /tmp/nuclei_batch_output.json >> "${{ env.RESULTS_DIR }}/nuclei_results.json" 2>/dev/null || true

            # Update batch progress
            python3 scripts/manage_progress.py batch $((batch + 1))
            python3 scripts/manage_progress.py status nuclei_scanning "running (batch $((batch+1))/$TOTAL_BATCHES)"

            # Upload intermediate results every 5 batches
            if [[ $((batch % 5)) -eq 0 ]] || [[ $batch -eq $((TOTAL_BATCHES - 1)) ]]; then
              # Upload checkpoint artifacts for resume
              cp "${{ env.RESULTS_DIR }}/nuclei_results.json" /tmp/nuclei_checkpoint.json 2>/dev/null || true
              echo "Checkpoint uploaded at batch $((batch+1))"
            fi

            # Check if we're approaching the workflow timeout
            # If so, trigger auto-resume
            ELAPSED_MINUTES=$((SECONDS / 60))
            if [[ $ELAPSED_MINUTES -gt ${{ env.WORKFLOW_TIMEOUT_MINUTES }} ]]; then
              echo "Approaching timeout. Triggering auto-resume."
              
              # Trigger repository_dispatch for continuation
              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${{ github.repository }}/dispatches \
                -d "{\"event_type\":\"resume_recon\",\"client_payload\":{\"target_domain\":\"${{ steps.resolve_target.outputs.target_domain }}\"}}" \
                || true
              
              echo "Auto-resume triggered. Current run will complete current batch gracefully."
              break
            fi
          done

          # Final upload after all batches
          python3 scripts/manage_progress.py complete nuclei_scanning

      - name: Upload artifacts after nuclei scanning
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-nuclei
          path: |
            ${{ env.RESULTS_DIR }}/nuclei_results.json
            ${{ env.PROGRESS_FILE }}
          if-no-files-found: warn

# ============================================================
# FINAL CONSOLIDATION & REPORTING
# ============================================================
      - name: Consolidate final results
        if: always()
        run: |
          echo "=== ELITE BUG BOUNTY RECON PIPELINE - FINAL REPORT ===" > ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "Target: ${{ steps.resolve_target.outputs.target_domain }}" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "Timestamp: $(date -u)" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          echo "" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt

          for file in subs.txt resolved.txt ports.txt alive.txt historical_urls.txt crawled_urls.txt \
                       normalized_urls.txt js_files.txt secrets.txt cloud_exposures.txt \
                       takeovers.txt cors_findings.json ssrf_candidates.txt redirect_candidates.txt \
                       sensitive_files.json default_creds.json nuclei_results.json; do
            if [[ -f "${{ env.RESULTS_DIR }}/$file" ]]; then
              COUNT=$(wc -l < "${{ env.RESULTS_DIR }}/$file" 2>/dev/null || echo 0)
              echo "$file: $COUNT results" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
            else
              echo "$file: NOT FOUND" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
            fi
          done

          echo "" >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt
          python3 scripts/manage_progress.py summary >> ${{ env.RESULTS_DIR }}/FINAL_SUMMARY.txt

      - name: Upload final consolidated results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-final
          path: ${{ env.RESULTS_DIR }}/
          if-no-files-found: warn
