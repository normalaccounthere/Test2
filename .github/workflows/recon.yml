PY
            exit 0
          fi
          naabu -silent -list "$WORK_ROOT/artifacts/dns_resolution/resolved.txt" -top-ports 100 -rate 100 -c 10 -scan-type c -exclude-cdn -o "$stage_dir/ports.txt"
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload port artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-03-port-scanning
          path: work/artifacts/port_scanning
          if-no-files-found: ignore

      - name: HTTP probing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=http_probing
          next=historical_url_gathering
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          httpx -silent -json -sc -title -tech-detect -location -include-chain -ip -list "$WORK_ROOT/artifacts/port_scanning/ports.txt" -o "$stage_dir/alive.txt"
          jq -r '.url // empty' "$stage_dir/alive.txt" | sort -u > "$stage_dir/alive_urls.txt"
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload HTTP artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-04-http-probing
          path: work/artifacts/http_probing
          if-no-files-found: ignore

      - name: Historical URL gathering
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=historical_url_gathering
          next=live_crawling
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          {
            printf '%s\n' "$TARGET_DOMAIN" | gau --subs || true
            printf '%s\n' "$TARGET_DOMAIN" | waybackurls || true
            xurlfind3r -d "$TARGET_DOMAIN" --include-subdomains --silent || true
          } | sort -u > "$stage_dir/historical_urls.txt"
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload historical URL artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-05-historical-url-gathering
          path: work/artifacts/historical_url_gathering
          if-no-files-found: ignore

      - name: Live crawling
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=live_crawling
          next=url_normalization
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          jq -r '.url // empty' "$WORK_ROOT/artifacts/http_probing/alive.txt" | sort -u > "$stage_dir/alive_urls.txt"
          katana -silent -list "$stage_dir/alive_urls.txt" -d 3 -rl 20 -hrl 5 -kf robotstxt,sitemapxml -o "$stage_dir/katana_urls.txt" || true
          xcrawl3r -l "$stage_dir/alive_urls.txt" --depth 3 --timeout 10 -C 5 -P 5 -s -o "$stage_dir/xcrawl3r_urls.txt" || true
          {
            cat "$stage_dir/katana_urls.txt" 2>/dev/null || true
            cat "$stage_dir/xcrawl3r_urls.txt" 2>/dev/null || true
          } | sort -u > "$stage_dir/crawled_urls.txt"
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload crawling artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-06-live-crawling
          path: work/artifacts/live_crawling
          if-no-files-found: ignore

      - name: URL normalization
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=url_normalization
          next=javascript_analysis
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          python3 - <<'PY'
from pathlib import Path
from urllib.parse import parse_qsl, urlsplit, urlunsplit, urlencode
import json

root = Path('work/artifacts')
inputs = []
for relative in [
    'historical_url_gathering/historical_urls.txt',
    'live_crawling/crawled_urls.txt',
    'http_probing/alive_urls.txt',
]:
    file_path = root / relative
    if file_path.exists():
        inputs.extend(line.strip() for line in file_path.read_text(encoding='utf-8').splitlines() if line.strip())

normalized = set()
for raw_url in inputs:
    parsed = urlsplit(raw_url.strip())
    scheme = (parsed.scheme or 'https').lower()
    netloc = parsed.netloc.lower()
    if not netloc and parsed.path.startswith('//'):
        parsed = urlsplit(f'https:{raw_url}')
        scheme = (parsed.scheme or 'https').lower()
        netloc = parsed.netloc.lower()
    if ':' in netloc:
        host, port = netloc.rsplit(':', 1)
        if (scheme == 'http' and port == '80') or (scheme == 'https' and port == '443'):
            netloc = host
    path = parsed.path or '/'
    query = urlencode(sorted(parse_qsl(parsed.query, keep_blank_values=True)))
    normalized.add(urlunsplit((scheme, netloc, path, query, '')))

out = Path('work/artifacts/url_normalization/normalized_urls.txt')
out.write_text('\n'.join(sorted(normalized)) + ('\n' if normalized else ''), encoding='utf-8')
PY
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload normalization artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-07-url-normalization
          path: work/artifacts/url_normalization
          if-no-files-found: ignore

      - name: JavaScript analysis
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=javascript_analysis
          next=secret_discovery
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          grep -Ei '\.js([?#]|$)' "$WORK_ROOT/artifacts/url_normalization/normalized_urls.txt" | sort -u > "$stage_dir/js_files.txt" || true
          katana -silent -jc -kb-endpoints -list "$WORK_ROOT/artifacts/http_probing/alive_urls.txt" -o "$stage_dir/js_endpoints.txt" || true
          sort -u "$stage_dir/js_endpoints.txt" -o "$stage_dir/js_endpoints.txt" 2>/dev/null || true
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-08-javascript-analysis
          path: work/artifacts/javascript_analysis
          if-no-files-found: ignore

      - name: Secret discovery
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=secret_discovery
          next=cloud_exposure_detection
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir/responses/js" "$stage_dir/responses/alive"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          if [ -s "$WORK_ROOT/artifacts/javascript_analysis/js_files.txt" ]; then
            httpx -silent -sr -srd "$stage_dir/responses/js" -list "$WORK_ROOT/artifacts/javascript_analysis/js_files.txt" -rl 20 || true
          fi
          if [ -s "$WORK_ROOT/artifacts/http_probing/alive_urls.txt" ]; then
            httpx -silent -sr -srd "$stage_dir/responses/alive" -list "$WORK_ROOT/artifacts/http_probing/alive_urls.txt" -rl 10 || true
          fi
          gitleaks dir "$stage_dir/responses" --report-format json --report-path "$stage_dir/gitleaks.json" --no-banner || true
          python3 - <<'PY'
import json
from pathlib import Path
report = Path('work/artifacts/secret_discovery/gitleaks.json')
out = Path('work/artifacts/secret_discovery/secrets.txt')
lines = []
if report.exists() and report.stat().st_size > 0:
    data = json.loads(report.read_text(encoding='utf-8'))
    for finding in data:
        lines.append(f"{finding.get('RuleID','')}\t{finding.get('File','')}\t{finding.get('Match','')}")
out.write_text('\n'.join(lines) + ('\n' if lines else ''), encoding='utf-8')
PY
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload secret artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-09-secret-discovery
          path: work/artifacts/secret_discovery
          if-no-files-found: ignore

      - name: Cloud exposure detection
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=cloud_exposure_detection
          next=subdomain_takeover_detection
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          cloud_templates=$(rg -l -i --glob '*.yml' --glob '*.yaml' 's3|gcs|azure|bucket|cloud' "$NUCLEI_TEMPLATES" | sort -u | paste -sd, -)
          if [ -n "$cloud_templates" ]; then
            nuclei -silent -jsonl -severity medium,high,critical -t "$cloud_templates" -list "$WORK_ROOT/artifacts/url_normalization/normalized_urls.txt" -o "$stage_dir/cloud_exposures.txt" || true
          else
            : > "$stage_dir/cloud_exposures.txt"
          fi
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload cloud artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-10-cloud-exposure-detection
          path: work/artifacts/cloud_exposure_detection
          if-no-files-found: ignore

      - name: Subdomain takeover detection
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=subdomain_takeover_detection
          next=cors_misconfiguration_detection
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          tools/Subhunter/subhunter -l "$WORK_ROOT/artifacts/dns_resolution/resolved.txt" -o "$stage_dir/takeovers.txt" || true
          takeover_templates=$(rg -l -i --glob '*.yml' --glob '*.yaml' 'takeover' "$NUCLEI_TEMPLATES" | sort -u | paste -sd, -)
          if [ -n "$takeover_templates" ]; then
            nuclei -silent -jsonl -severity medium,high,critical -t "$takeover_templates" -list "$WORK_ROOT/artifacts/dns_resolution/resolved.txt" -o "$stage_dir/takeover_nuclei.txt" || true
          fi
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload takeover artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-11-subdomain-takeover-detection
          path: work/artifacts/subdomain_takeover_detection
          if-no-files-found: ignore

      - name: CORS misconfiguration detection
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=cors_misconfiguration_detection
          next=ssrf_endpoint_discovery
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
          cors_templates=$(rg -l -i --glob '*.yml' --glob '*.yaml' 'cors|cross-origin|cross origin|origin header' "$NUCLEI_TEMPLATES" | sort -u | paste -sd, -)
          if [ -n "$cors_templates" ]; then
            nuclei -silent -jsonl -severity medium,high,critical -t "$cors_templates" -list "$WORK_ROOT/artifacts/http_probing/alive_urls.txt" -o "$stage_dir/cors_findings.txt" || true
          else
            : > "$stage_dir/cors_findings.txt"
          fi
          python3 scripts/progress.py advance --progress "$WORK_ROOT/progress.json" --last-completed-stage "$stage" --next-stage "$next" --current-batch 1
          cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"

      - name: Upload CORS artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-12-cors-misconfiguration-detection
          path: work/artifacts/cors_misconfiguration_detection
          if-no-files-found: ignore

      - name: SSRF endpoint discovery
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage=ssrf_endpoint_discovery
          next=open_redirect_discovery
          stage_dir="$WORK_ROOT/artifacts/$stage"
          mkdir -p "$stage_dir"
          if [ "$(python3 scripts/progress.py next --progress "$WORK_ROOT/progress.json")" != "$stage" ]; then
            cp "$WORK_ROOT/progress.json" "$stage_dir/progress.json"
            exit 0
          fi
